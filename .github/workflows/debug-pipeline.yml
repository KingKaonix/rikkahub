name: Debug Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Checkout Material Color Utilities
        run: |
          git clone https://github.com/material-foundation/material-color-utilities.git material3/material-color-utilities

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache pnpm Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web-ui/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install web-ui pnpm Dependencies
        run: pnpm install --store-dir ~/.pnpm-store
        working-directory: ./web-ui

      - name: Build Web UI
        run: pnpm build
        working-directory: ./web-ui

      - name: Create google-services.json placeholder
        run: |
          echo '{
            "project_info": {
              "project_number": "123456789012",
              "project_id": "rikkahub-ci"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789012:android:1234567890abcdef",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "your-api-key"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789012:android:1234567890abcd12",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub.debug"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "your-api-key"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }' > app/google-services.json

      - name: Assemble Debug Build
        run: ./gradlew assembleDebug

  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Checkout Material Color Utilities
        run: |
          git clone https://github.com/material-foundation/material-color-utilities.git material3/material-color-utilities

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Cache pnpm Dependencies (for lint)
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web-ui/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install web-ui pnpm Dependencies (for lint)
        run: pnpm install --store-dir ~/.pnpm-store
        working-directory: ./web-ui

      - name: Create google-services.json placeholder
        run: |
          echo '{
            "project_info": {
              "project_number": "123456789012",
              "project_id": "rikkahub-ci"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789012:android:1234567890abcdef",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "your-api-key"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789012:android:1234567890abcd12",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub.debug"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "your-api-key"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }' > app/google-services.json

      - name: Run Android Lint
        run: ./gradlew lint
        continue-on-error: false # Fail CI on lint errors

      - name: Run web-ui ESLint
        run: pnpm lint
        working-directory: ./web-ui
        continue-on-error: false # Fail CI on lint errors

  unit_tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Checkout Material Color Utilities
        run: |
          git clone https://github.com/material-foundation/material-color-utilities.git material3/material-color-utilities

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Cache Gradle Dependencies (for tests)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache pnpm Dependencies (for tests)
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web-ui/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install web-ui pnpm Dependencies (for tests)
        run: pnpm install --store-dir ~/.pnpm-store
        working-directory: ./web-ui

      - name: Create google-services.json placeholder
        run: |
          echo '{
            "project_info": {
              "project_number": "123456789012",
              "project_id": "rikkahub-ci"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789012:android:1234567890abcdef",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "your-api-key"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789012:android:1234567890abcd12",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub.debug"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "your-api-key"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }' > app/google-services.json

      - name: Run Kotlin Unit Tests
        run: ./gradlew test # This will run all JVM unit tests across modules
        env:
          TERM: dumb # Fix for some Gradle outputs in CI

      - name: Run web-ui Vitest Unit Tests
        run: pnpm test --run # --run ensures it runs all tests once
        working-directory: ./web-ui

      - name: Publish Test Results (Kotlin)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Kotlin Unit Tests
          path: '**/build/test-results/testDebugUnitTest/*.xml'
          reporter: java-junit
          fail-on-error: true # Fail if any test report processing fails

      - name: Publish Test Results (web-ui)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Web-UI Unit Tests
          path: 'web-ui/junit.xml' # Path configured in vitest.config.ts
          reporter: jest-junit
          fail-on-error: true

      - name: Generate and Publish Kotlin Test Coverage Report
        run: ./gradlew jacocoTestReport
        if: always() # Always generate report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kotlin-coverage-report
          path: '**/build/reports/jacoco/' # Adjust path if JaCoCo report is in different module
      - name: Publish Kotlin Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: '**/build/reports/jacoco/testDebugUnitTest/*.xml' # JaCoCo XML for Codecov
          fail_ci_if_error: true
          verbose: true

      - name: Upload web-ui Vitest Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-ui-coverage-report
          path: 'web-ui/coverage/' # Path configured in vitest.config.ts

  instrumented_tests:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        api-level: [33] # Latest stable Android API level
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Checkout Material Color Utilities
        run: |
          git clone https://github.com/material-foundation/material-color-utilities.git material3/material-color-utilities

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: default
          avd-name: test_avd
          disable-animations: true
          force-avd-create: true
          boot-timeout: 600
          cores: 2
          ram-size: 2048M
          heap-size: 512M
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-snapshot -no-snapshot-save
          script: ./gradlew connectedDebugAndroidTest

      - name: Publish Instrumented Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Android Instrumented Tests
          path: '**/build/outputs/androidTest-results/connected/*.xml'
          reporter: java-junit
          fail-on-error: true

  release_apk:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Checkout Material Color Utilities
        run: |
          git clone https://github.com/material-foundation/material-color-utilities.git material3/material-color-utilities

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle Dependencies (for release)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Cache pnpm Dependencies (for release)
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web-ui/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install web-ui pnpm Dependencies (for release)
        run: pnpm install --store-dir ~/.pnpm-store
        working-directory: ./web-ui

      - name: Create google-services.json placeholder
        run: |
          echo '{
            "project_info": {
              "project_number": "123456789012",
              "project_id": "rikkahub-ci"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789012:android:1234567890abcdef",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "your-api-key"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789012:android:1234567890abcd12",
                  "android_client_info": {
                    "package_name": "me.rerere.rikkahub.debug"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "your-api-key"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }' > app/google-services.json

      - name: Setup Android Keystore
        run: |
          mkdir -p ~/.android/
          echo "${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks
        shell: bash

      - name: Configure Signing Properties
        run: |
          cat >> local.properties << 'EOF'
          storeFile=keystore.jks
          storePassword=${{ secrets.ANDROID_SIGNING_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
          EOF

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: List APK Outputs
        run: ls -la app/build/outputs/apk/release/

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk