name: Robust Debug Build

on: [push, pull_request]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Android SDK
      id: android-sdk
      uses: android-actions/setup-android@v3

    - name: Build Debug APK
      id: build_apk
      env:
        ANDROID_HOME: ${{ steps.android-sdk.outputs.android-sdk-path }}
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace --info > build_full.log 2>&1 || { echo "::error ::Gradle build failed. See full log below." && cat build_full.log && exit 1; }
        echo "::notice ::Gradle build successful."

    - name: Upload Logs on Failure
      if: failure() && steps.build_apk.outcome == 'failure'
      uses: actions/upload-artifact@v4
      
      with:
        name: build-failure-log
        path: build_full.log
        retention-days: 7
