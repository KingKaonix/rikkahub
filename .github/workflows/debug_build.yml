name: Robust Debug Build

on: [push, pull_request]

jobs:
  debug:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      id: setup-java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Android SDK
      id: android-sdk
      uses: android-actions/setup-android@v3

    - name: Create google-services.json placeholder
      run: |
        cat > app/google-services.json << 'EOF'
        {
          "project_info": {
            "project_number": "000000000000",
            "project_id": "ci-placeholder",
            "storage_bucket": "ci-placeholder.appspot.com"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": {
                  "package_name": "me.rerere.rikkahub"
                }
              },
              "oauth_client": [],
              "api_key": [
                {
                  "current_key": "PLACEHOLDER_API_KEY_FOR_CI"
                }
              ],
              "services": {
                "appinvite_service": {
                  "other_platform_oauth_client": []
                }
              }
            }
          ],
          "configuration_version": "1"
        }
        EOF

    - name: Build Debug APK
      id: build_apk
      env:
        ANDROID_HOME: ${{ steps.android-sdk.outputs.android-sdk-path }}
        JAVA_HOME: ${{ steps.setup-java.outputs.path }}
      run: |
        chmod +x gradlew
        rm -rf ~/.gradle/.tmp/jdks
        ./gradlew assembleDebug --stacktrace --info > build_full.log 2>&1 || { 
            echo "::error::Build failed, extracting errors..."
            grep -iE "error|fail|exception" build_full.log > errors.log 2>&1
            exit 1 
        }

    - name: Upload Errors Only
      if: failure() && steps.build_apk.outcome == 'failure'
      uses: actions/upload-artifact@v4
      with:
        name: build-errors
        path: errors.log
        retention-days: 7
